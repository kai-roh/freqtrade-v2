services:
  freqtrade:
    # FreqAI 포함 이미지 (LightGBM, CatBoost, PyTorch 사전 설치)
    image: freqtradeorg/freqtrade:stable_freqai
    restart: unless-stopped
    container_name: freqtrade_kai
    volumes:
      - "./user_data:/freqtrade/user_data"
      - "./scripts:/freqtrade/scripts:ro"
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
      # Freqtrade는 config.json의 ${VAR}를 자동 치환하지 않음.
      # FREQTRADE__SECTION__KEY 패턴으로 config 값을 override해야 함.
      - FREQTRADE__API_SERVER__USERNAME=${FREQTRADE_USERNAME}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_PASSWORD}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${JWT_SECRET}
      - FREQTRADE__EXCHANGE__KEY=${BINANCE_API_KEY}
      - FREQTRADE__EXCHANGE__SECRET=${BINANCE_API_SECRET}
      - FREQTRADE__TELEGRAM__TOKEN=${TELEGRAM_TOKEN}
      - FREQTRADE__TELEGRAM__CHAT_ID=${TELEGRAM_CHAT_ID}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy KaiBaseStrategy
      --freqaimodel LLMEnhancedModel
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/ping || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
